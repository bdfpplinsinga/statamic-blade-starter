<div class="bg-white py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto grid max-w-lg grid-cols-4 items-center gap-x-8 gap-y-12 sm:max-w-xl sm:grid-cols-6 sm:gap-x-10 sm:gap-y-14 lg:mx-0 lg:max-w-none lg:grid-cols-5">
      {{ loop times="5"}}
        <img  src="https://tailwindcss.com/plus-assets/img/logos/158x48/transistor-logo-gray-900.svg" alt="Transistor" class="col-span-2 max-h-12 w-full object-contain lg:col-span-1" />
      {{/loop}}      
    </div>
    <div class="mt-16 flex justify-center">
      <p class="relative rounded-full bg-gray-50 px-4 py-1.5 text-sm/6 text-gray-600 inset-ring inset-ring-gray-900/5">
        <span class="hidden md:inline">Over 2500 companies use our tools to better their business.</span>
        <x-buttons.link url="#" cover icon >
          Read our customer stories 
        </x-buttons.link>
      </p>
    </div>
  </div>
</div>
